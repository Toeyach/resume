    <style>

            pointer-events: none;
            animation: scan 4s linear infinite;

<body class="text-slate-300">

                            <h2 className="text-2xl font-bold text-white uppercase tracking-tight">{cur.nav.experience}</h2>
                        </div>
                        <div className="space-y-6">
                            {cur.experience.map((exp, i) => (
                                <div key={i} className="bg-slate-900/40 border border-slate-800 p-8 rounded-3xl hover:border-cyan-500/30 transition-all group">

                                        <div>

                    <section id="certs" className="scroll-mt-24">

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

</body>
</html>
